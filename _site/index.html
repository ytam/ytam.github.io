<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Yıldırım TAM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Senior Android Developer">
    <link rel="shortcut icon" href="imgs/mobile.svg" />
    <link rel="stylesheet" href="css/front.css?v=20260225">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="theme-toggle" role="group" aria-label="Theme switch">
        <button class="theme-option" type="button" data-theme-target="light" aria-label="Light theme" aria-pressed="false">
            <i class="fa-solid fa-sun" aria-hidden="true"></i>
        </button>
        <button class="theme-option" type="button" data-theme-target="dark" aria-label="Dark theme" aria-pressed="false">
            <i class="fa-solid fa-moon" aria-hidden="true"></i>
        </button>
    </div>

    <main class="page">
        <section class="card">
            <header class="intro">
                <h1>Hi, I'm Yıldırım 👋</h1>
                <p>Senior Android Developer</p>
            </header>

            <div class="divider" aria-hidden="true"></div>

            <nav class="social-links" aria-label="Social links">
                <a class="social-button" href="https://github.com/ytam" target="_blank" rel="noopener noreferrer">
                    <i class="fa-brands fa-github" aria-hidden="true"></i>
                    <span>GitHub</span>
                </a>

                <a class="social-button" href="https://linkedin.com/in/yildirimtam/" target="_blank" rel="noopener noreferrer">
                    <i class="fa-brands fa-linkedin" aria-hidden="true"></i>
                    <span>LinkedIn</span>
                </a>

                <a class="social-button" href="https://stackoverflow.com/users/9054597" target="_blank" rel="noopener noreferrer">
                    <i class="fa-brands fa-stack-overflow" aria-hidden="true"></i>
                    <span>StackOverflow</span>
                </a>

                <a class="social-button" href="mailto:yildirimtam@gmail.com">
                    <i class="fa-regular fa-envelope" aria-hidden="true"></i>
                    <span>Email</span>
                </a>
            </nav>
        </section>
    </main>
    <footer class="page-footer">
        © 2026 Yıldırım Tam. All rights reserved.
    </footer>
</body>
<script>
    (function () {
        var root = document.documentElement;
        var options = document.querySelectorAll(".theme-option");

        function setTheme(theme) {
            root.setAttribute("data-theme", theme);
            options.forEach(function (button) {
                var isActive = button.getAttribute("data-theme-target") === theme;
                button.classList.toggle("active", isActive);
                button.setAttribute("aria-pressed", isActive ? "true" : "false");
            });
        }

        var savedTheme = localStorage.getItem("theme");
        var prefersLight = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches;
        var initialTheme = savedTheme || (prefersLight ? "light" : "dark");
        setTheme(initialTheme);

        if (options.length) {
            options.forEach(function (button) {
                button.addEventListener("click", function () {
                    var next = button.getAttribute("data-theme-target");
                    setTheme(next);
                    localStorage.setItem("theme", next);
                });
            });
        }
    })();
</script>
</html>
